<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bry's Gallery (˶˃𐃷˂˶)</title>
    <style>

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffd1df;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .gallery-title {
            color: #E83366;
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 2px 2px white;
        }


        .scrapbook-container {
            background-color: #fff0f5;
            border: 3px dashed #E83366;
            border-radius: 25px;
            padding: 40px;
            max-width: 1100px;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            box-shadow: 0 10px 20px rgba(232, 51, 102, 0.2);
            position: relative;
        }


        .photo-frame {
            background-color: white;
            padding: 12px 12px 45px 12px; /* Extra bottom padding for captions */
            border-radius: 4px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 1px solid #eee;
            cursor: pointer;
            position: relative;
            margin: 0;

            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        box-shadow 0.3s ease, 
                        z-index 0s;
            z-index: 1;
        }

        .photo-frame img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border: 1px solid #f0f0f0;
            display: block;
        }


        .photo-frame figcaption {
            position: absolute;
            bottom: 10px;
            left: 0;
            right: 0;
            text-align: center;
            font-family: 'Brush Script MT', cursive, sans-serif;
            color: #AD254C;
            font-size: 1.1rem;
            opacity: 0.7;
            transition: opacity 0.3s;
        }


        .photo-frame:nth-child(odd) { transform: rotate(-3deg); }
        .photo-frame:nth-child(even) { transform: rotate(2deg); }
        .photo-frame:nth-child(3n) { transform: rotate(4deg); }

  
        .photo-frame:hover {
            transform: scale(1.15) rotate(0deg) translateY(-15px);
            z-index: 50;
            box-shadow: 0 25px 50px rgba(232, 51, 102, 0.4);
            border-color: #E83366;
        }

        .photo-frame:hover figcaption {
            opacity: 1;
            font-weight: bold;
        }

        /* Footer Section */
        footer {
            margin-top: 40px;
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            border: 2px solid #E83366;
            color: #AD254C;
            text-align: center;
            max-width: 700px;
            line-height: 1.6;
            font-style: italic;
            box-shadow: 4px 4px 0px #E83366;
        }

        .sparkle-decor { font-size: 1.5rem; margin: 10px; }

        .back-home {
            margin-top: 40px;
            text-decoration: none;
            color: #E83366;
            font-weight: bold;
            font-size: 1.1rem;
            border-bottom: 2px solid #E83366;
            transition: 0.2s;
        }

        .back-home:hover { letter-spacing: 1px; background-color: #fff0f5; }

        @media (max-width: 600px) {
            .scrapbook-container { padding: 20px; gap: 15px; }
            .photo-frame { transform: none !important; }
        }
    </style>
</head>
