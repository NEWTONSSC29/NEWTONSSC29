<!DOCTYPE html>
<html>
<head> 
    <title>My Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Brush+Script+MT&display=swap" rel="stylesheet">
    <style>
     
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe6f0, #ffc1e3, #ffb3c6);
            text-align: center;
            margin: 0;
            padding: 60px 20px;
            color: #4d0033;
            overflow-x: hidden;
            position: relative;
        }

       
        .sticker {
            position: absolute;
            width: 150px;
            animation: float 8s ease-in-out infinite;
            opacity: 0.8;
        }

        .sticker:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
        .sticker:nth-child(2) { top: 20%; right: 10%; animation-delay: 2s; }
        .sticker:nth-child(3) { bottom: 15%; left: 15%; animation-delay: 4s; }
        .sticker:nth-child(4) { bottom: 10%; right: 20%; animation-delay: 6s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(15deg); }
        }

        
        h1 {
            font-size: 52px;
            margin-bottom: 20px;
            font-weight: 700;
            color: #d81b60;
            text-shadow: 2px 2px 6px rgba(255,255,255,0.6), 0 0 15px rgba(255,192,203,0.5);
        }

        h2 {
            font-size: 30px;
            margin: 30px 0 15px;
            color: #c2185b;
            text-shadow: 1px 1px 4px rgba(255,255,255,0.5);
        }

        
        .back-btn {
            display: inline-block;
            padding: 16px 35px;
            background: linear-gradient(45deg, #F06292, #FF4081, #ff80ab);
            color: white;
            border-radius: 20px;
            font-family: "Brush Script MT", cursive;
            font-size: 26px;
            margin-bottom: 40px;
            transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
            text-decoration: none;
            box-shadow: 0 6px 20px rgba(255,0,128,0.4), 0 0 15px rgba(255,182,193,0.6);
        }

        .back-btn:hover {
            transform: scale(1.12);
            background: linear-gradient(135deg, #FF80AB, #F48FB1, #FF4081);
            box-shadow: 0 10px 30px rgba(255,0,128,0.6), 0 0 25px rgba(255,192,203,0.8);
        }

        
        img {
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(255,105,180,0.3), 0 0 25px rgba(255,182,193,0.5);
            margin-bottom: 25px;
            width: 300px;
            height: 200px;
            object-fit: cover;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        img:hover {
            transform: scale(1.07);
            box-shadow: 0 12px 35px rgba(255,105,180,0.5), 0 0 35px rgba(255,182,193,0.7);
        }

        
        ul {
            list-style: none;
            padding-left: 0;
            max-width: 650px;
            margin: 0 auto 50px;
            text-align: left;
            font-size: 19px;
            line-height: 1.8;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            box-shadow: 0 10px 35px rgba(255,105,180,0.3), 0 0 25px rgba(255,182,193,0.2);
            padding: 30px 40px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            position: relative;
        }

        li {
            margin-bottom: 12px;
        }

        
        hr {
            border: 0;
            height: 2px;
            background: linear-gradient(to right, #ff80ab, #ff4081, #F06292);
            margin: 50px auto;
            width: 80%;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(255,105,180,0.6);
        }

        
        iframe {
            display: block;
            margin: 30px auto 60px;
            border-radius: 20px;
            box-shadow: 0 12px 35px rgba(255,105,180,0.3), 0 0 25px rgba(255,182,193,0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        iframe:hover {
            transform: scale(1.03);
            box-shadow: 0 15px 40px rgba(255,105,180,0.5), 0 0 35px rgba(255,182,193,0.6);
        }

       
        .ul-sticker {
            position: absolute;
            width: 30px;
        }

    </style>
</head>
