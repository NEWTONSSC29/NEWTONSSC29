<style>

body{
  text-align: center;
  background-color: papayawhip;
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
}
.container {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.bar {
  flex: 1 1 200px;
  background-color: lightblue;
  padding: 20px;
  text-align: center;
  width: 200px;
  height: 100px;
  color: black;
  font-size: 20px;
  font-family: "Times New Roman", serif;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 20px auto;
  border-radius: 10px;
  background-size: cover;
  background-position: center;
}

.Profile {
  background-color: #fa5d2d;
  background-image: url('https://i.pinimg.com/736x/51/e9/63/51e963f04b2cbe4e4708c00086cbaea5.jpg');
}
.Gallery{
  background-color: #a14aff;
  background-image: url('https://i.pinimg.com/736x/6e/e2/99/6ee299def1d1990f45a48674115b627b.jpg');
}
.Hobby{
  background-color: #86fa39;
  background-image: url('https://i.pinimg.com/736x/75/44/00/7544001e86ce5c13e33d120c5937fda0.jpg');
}
.BackToSectionWebsite {
  background-color: #f5a2d5; 
  background-image: url('https://i.pinimg.com/736x/7e/97/b3/7e97b378a2f802570f501b80c0d17480.jpg');
}

.bg-image {
  background-image: url("https://i.pinimg.com/1200x/f7/29/a7/f729a713b2087124283991a9851d39d1.jpg");
  filter: blur(6px);
  -webkit-filter: blur(8px);
  height: 100%; 
  width: 100%;
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
  background-position: center top;
  background-repeat: no-repeat;
  background-size: cover;
}

.bg-text {
  background-color: rgba(0,0,0, 0.4);
  color: white;
  font-weight: bold;
  border: 3px solid #f1f1f1;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 2;
  width: 80%;
  padding: 20px;
  text-align: center;
}
</style>
</head>
