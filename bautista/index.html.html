<!DOCTYPE html>
<html>
<head>
<title>My Creative Corner</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to bottom right, #f3f0ff, #ffffff);
  text-align: center;
}

.container {
  padding: 80px 20px;
}

h1 {
  color: #7b68b3;
  font-size: 48px;
  margin-bottom: 10px;
}

.subtitle {
  color: #888;
  font-style: italic;
  margin-bottom: 50px;
}

.button-container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 25px;
}

.btn {
  background-color: #e6e0ff;
  color: #5e548e;
  padding: 15px 40px;
  text-decoration: none;
  border-radius: 30px;
  font-size: 18px;
  transition: 0.3s ease;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.btn:hover {
  background-color: #d6ccff;
  transform: translateY(-3px);
}

.back-btn {
  display: inline-block;
  margin-top: 30px;
  background-color: transparent;
  border: 2px solid #d6ccff;
  color: #7b68b3;
  padding: 10px 25px;
  border-radius: 25px;
  text-decoration: none;
  transition: 0.3s ease;
}

.back-btn:hover {
  background-color: #f0ebff;
}
</style>
</head>

<body>

<div class="container">
  <h1>Welcome to My Website!</h1>
  <p class="subtitle">Step inside and get to know me better✨</p>

  <div class="button-container">
    <a href="profile.html" class="btn">My Profile</a>
    <a href="gallery.html" class="btn">Visual Gallery</a>
    <a href="hobbies.html" class="btn">Interests & Hobbies</a>
  </div>

  <!-- Back Button (reloads main hub) -->
  <a href="index.html" class="back-btn">← Back to Main Hub</a>

</div>

</body>
</html>
