<!DOCTYPE html>
<html>
<head>
<title>Visual Gallery</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f3f0ff;
  text-align: center;
  padding: 50px 20px;
  color: #5e548e;
}

h1 {
  font-size: 48px;
  margin-bottom: 10px;
  color: #7b68b3;
}

.subtitle {
  font-size: 20px;
  font-style: italic;
  margin-bottom: 40px;
  color: #988fc7;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 25px;
  justify-items: center;
}

.gallery img {
  width: 220px;
  height: 220px;
  object-fit: cover;
  border-radius: 20px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.05);
}

.back-btn {
  display: inline-block;
  margin-top: 40px;
  text-decoration: none;
  background-color: #e6e0ff;
  padding: 12px 28px;
  border-radius: 25px;
  color: #5e548e;
  transition: 0.3s ease;
}

.back-btn:hover {
  background-color: #d6ccff;
  transform: translateY(-2px);
}
</style>
</head>
