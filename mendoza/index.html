    <style>
        body {
            
            background: url('https://images.steamusercontent.com/ugc/17123052942006105411/150B1A67786BD7A1EE5B17CF425BFB6DDCC43158/?imw=512&&ima=fit&impolicy=Letterbox&imcolor=%23000000&letterbox=false') no-repeat center center fixed;

            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;

        .container {
            background: rgba(14, 20, 31, 0.85); 
            width: 90%;
            max-width: 600px;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #9999e6;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            color: #9999e6;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        h3 {
            font-weight: lighter;
            color: #ccccff;
            margin-top: 0;
            font-style: italic;
        }

        hr {
            border: 0;
            height: 1px;
            background-image: linear-gradient(to right, rgba(207, 188, 153, 0), rgba(207, 188, 153, 0.55), rgba(207, 188, 153, 0));
            margin: 20px 0;
        }

       
        .nav-link {
            text-decoration: none;
            color: #b3c6ff;
            font-weight: bold;
            margin: 0 15px;
            padding: 5px 10px;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .nav-link:hover {
            color: #b3c6ff;
            background: rgba(207, 188, 153, 0.2);
            border-radius: 5px;
            border: 1px solid #99ccff;
        }

        .featured-img {
            width: 100%;
            max-width: 400px;
            border-radius: 10px;
            border: 2px solid #99ccff;
            margin-top: 20px;
        }

        .video-button {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 25px;
            background: #99ccff; /* Button color like game menus */
            color: white;
            text-decoration: none;
            border-radius: 25px;
            border: 1px solid #ccd9ff;
            transition: background 0.3s;
        }

        .video-button:hover {
            background: #cce6ff;
            color: #668cff;
        }

        .song-list-container {
            text-align: left;
            display: inline-block;
            background: rgba(207, 188, 153, 0.2);
            padding: 15px 40px;
            border-radius: 10px;
            margin-top: 10px;
        }

        ul {
            list-style-type: "✦ ";
            color: #99ccff;
        }

        li {
            margin: 10px 0;
            font-size: 1.1em;
        }

        li a {
            color: #6666ff;
            text-decoration: none;
        }

        li a:hover {
            text-decoration: underline;
        }

        footer {
            margin-top: 30px;
            font-size: 0.8em;
            color: #666;
        }
