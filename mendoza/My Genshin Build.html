<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Genshin Build</title>
    <style>
          
        body {
            background-color: #99c2ff;
            color: #4747d1;
            font-family: 'Segoe UI', sans-serif;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .gallery {
            display: flex;
            flex-direction: column;
            gap: 50px;
            width: 100%;
            max-width: 900px;
        }

        .build-card {
            background: #b3b3ff;
            border-radius: 15px;
            border: 2px solid #3d4466;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .build-image {
            width: 100%;
            display: block;
            border-bottom: 2px solid #3d4466;
        }

        .build-info {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to right, #161b33, #1f2647);
        }

        .char-name {
            font-size: 24px;
            font-weight: bold;
            color: #4cc9f0;
        }

        .build-rank {
            background: #f72585;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        h1 { margin-bottom: 40px; color: #f1f1f1; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <h1>My Genshin Showcase</h1>

    <div class="gallery">
        
        <div class="build-card">
            <img src="Neuvillette-672c6f608f1b3f627f77f4df (1).png" alt="Neuvillette Build" class="build-image">
            <div class="build-info">
                <div class="char-name">Neuvillette</div>
                <div class="build-rank">2470% RV</div>
            </div>
        </div>

        <div class="build-card">
            <img src="Columbina-696a4ea2b651c04901f98127.png" alt="Columbina Build" class="build-image">
            <div class="build-info">
                <div class="char-name">Columbina</div>
                <div class="build-rank">3120% RV</div>
            </div>
        </div>
        
        <div class="build-card">
            <img src="Yelan-672c6f608f1b3f627f77f4dd (1).png" alt="Yelan Build" class="build-image">
            <div class="build-info">
                <div class="char-name">Yelan</div>
                <div class="build-rank">2050% RV</div>
            </div>
        </div>
       
        <div class="build-card">
            <img src="Lauma-68edecd5b2313cf5129e88ed.png" alt="Lauma Build" class="build-image">
            <div class="build-info">
                <div class="char-name">Lauma</div>
                <div class="build-rank">1810% RV</div>
            </div>
        </div>
 
        <div class="build-card">
            <img src="Skirk-68652c80827b14510f69bbe9 (1).png" alt="Skirk Build" class="build-image">
            <div class="build-info">
                <div class="char-name">Skirk</div>
                <div class="build-rank">2280% RV</div>
            </div>
        </div>
 
        <div class="build-card">
            <img src="Flins-6915d292b2313cf51279d12f.png" alt="Flins Build" class="build-image">
            <div class="build-info">
                <div class="char-name">Flins</div>
                <div class="build-rank">2480% RV</div>
            </div>
        </div>

    </div>
 <hr>

    <div class="links-container">
        <a href="index.html">Back to Home</a>
        <br><br>

    </div>

</body>
</html>
