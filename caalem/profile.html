<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <style>
        body {
            background-color: #ff0000; /* Bright red background */
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 50px 20px;
        }

        .main-wrapper {
            max-width: 750px;
            margin: 0 auto;
            background: #b22222; /* Dark red box */
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            color: #fff; /* White text inside the box */
        }

        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-pic {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            border: 4px solid #fff;
            object-fit: cover;
            margin-bottom: 15px;
        }

        .header-section h1 {
            margin: 0;
            font-size: 2rem;
        }

        .details-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            border-top: 2px solid rgba(255,255,255,0.2);
            padding-top: 30px;
        }

        .left-col, .right-col {
            flex: 1;
            text-align: left;
        }

        .info-item {
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .info-label {
            font-weight: bold;
            color: #ffd700;
            display: block;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .bio-text {
            line-height: 1.5;
            font-size: 1rem;
        }

        .quote-style {
            margin-top: 20px;
            padding: 15px;
            background-color: rgba(255, 215, 0, 0.2); /* Light gold transparent */
            border-left: 4px solid #ffd700;
            font-style: italic;
            color: #fff;
            border-radius: 8px;
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            text-decoration: none;
            color: #ffd700;
            font-weight: bold;
            font-size: 0.95rem;
            padding: 8px 20px;
            border: 2px solid #ffd700;
            border-radius: 20px;
            transition: 0.3s ease;
        }

        .back-link:hover {
            background-color: #ffd700;
            color: #b22222;
        }

        @media (max-width: 700px) {
            .details-grid {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <div class="header-section">
            <img src="img_boy.jpg" alt="Profile Picture" class="profile-pic">
            <h1>James Bryan C. Caalem</h1>
        </div>

        <div class="details-grid">
            
            <div class="left-col">
                <div class="info-item">
                    <span class="info-label">Birthday</span>
                    November 23, 2009
                </div>
                <div class="info-item">
                    <span class="info-label">Section</span>
                    10-SSC
                </div>
                <div class="info-item">
                    <span class="info-label">Favorite Subject</span>
                    English
                </div>
            </div>

            <div class="right-col">
                <span class="info-label">About Me</span>
                <p class="bio-text">
                    I enjoy my class with my friends and wish to graduate in this school year.
                </p>

                <div class="quote-style">
                    "Dream big, work hard, stay humble."
                </div>
            </div>

        </div> 

        <div style="text-align: center;">
            <a href="index.html" class="back-link">← Back to Menu</a>
        </div>

    </div> 

</body>
</html>
