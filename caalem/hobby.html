<!DOCTYPE html>
<html>
<head>
<title>Interests & Hobbies</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #ff4d4d; /* red background */
  text-align: center;
  padding: 60px 20px;
}

h1 {
  color: #7b68b3;
  margin-bottom: 40px;
}

/* Hobby card style */
.hobby-card {
  display: inline-block;
  background: linear-gradient(135deg, #ffe6e6, #ffd6d6);
  margin: 10px;
  padding: 20px 25px;
  border-radius: 25px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  font-size: 18px;
  font-weight: 500;
  color: #7b1d1d;
  min-width: 200px;
  transition: transform 0.3s, box-shadow 0.3s;
  cursor: default;
}

.hobby-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 15px 30px rgba(0,0,0,0.15);
}

a {
  display: inline-block;
  margin-top: 40px;
  text-decoration: none;
  background-color: #e6e0ff;
  padding: 14px 32px;
  border-radius: 25px;
  color: #5e548e;
  font-weight: 600;
  transition: 0.3s ease;
}

a:hover {
  background-color: #d6ccff;
  transform: translateY(-2px);
}
</style>
</head>

<body>

<h1>Interests & Hobbies</h1>

<!-- Hobby cards (decorative) -->
<div class="hobby-card">🏀 Playing Basketball</div>
<div class="hobby-card">✈️ Traveling</div>
<div class="hobby-card">🚴 Biking</div>
<div class="hobby-card">🎵 Playing Music</div>
<div class="hobby-card">🍳 Cooking</div>
<div class="hobby-card">🖌 Digital Art</div>
<div class="hobby-card">🎮 Gaming</div>

<!-- Only clickable link -->
<a href="index.html">← Back to Main Hub</a>

</body>
</html>
