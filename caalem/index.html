<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>index</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Raleway:wght@300;500&display=swap');

body {
    margin: 0;
    padding: 0;
    font-family: 'Raleway', sans-serif;
    background: linear-gradient(135deg, #8B0000, #B22222, #DC143C);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    text-align: center;
}

/* Glass Card */
.main-card {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(20px);
    padding: 60px 40px;
    border-radius: 30px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    width: 90%;
    max-width: 900px;
    animation: fadeIn 1.2s ease;
}

/* Title */
h1 {
    font-family: 'Playfair Display', serif;
    font-size: 3.2rem;
    margin: 0;
    color: white;
    letter-spacing: 2px;
}

.subtitle {
    margin-top: 12px;
    font-weight: 300;
    color: #ffd6d6;
    font-size: 1.1rem;
}

/* Buttons */
.container {
    margin-top: 50px;
    display: flex;
    gap: 25px;
    justify-content: center;
    flex-wrap: wrap;
}

.box {
    flex: 1 1 200px;
    border-radius: 20px;
    overflow: hidden;
    transition: all 0.4s ease;
}

.box a {
    display: block;
    padding: 25px;
    text-decoration: none;
    font-weight: 500;
    font-size: 1.1rem;
    color: white;
    background: linear-gradient(135deg, #ff4d4d, #cc0000);
    border-radius: 20px;
    transition: all 0.4s ease;
}

.box:hover {
    transform: translateY(-10px);
}

.box a:hover {
    background: linear-gradient(135deg, #ff6666, #990000);
    box-shadow: 0 10px 25px rgba(255, 0, 0, 0.5);
}

/* Back button */
.back-button a {
    background: linear-gradient(135deg, #550000, #330000);
}

.back-button a:hover {
    background: linear-gradient(135deg, #770000, #440000);
}

/* Animation */
@keyframes fadeIn {
    from {opacity:0; transform: translateY(30px);}
    to {opacity:1; transform: translateY(0);}
}

@media (max-width: 600px) {
    h1 { font-size: 2.2rem; }
    .container { flex-direction: column; }
}
</style>
</head>

<body>

<div class="main-card">
    <h1>Introduction</h1>
    <div class="subtitle">Welcome to my page</div>

    <div class="container">
        <div class="box"><a href="profile.html">My Profile</a></div>
        <div class="box"><a href="gallery.html">Visual Gallery</a></div>
        <div class="box"><a href="hobby.html">Interests & Hobbies</a></div>
        <div class="box back-button"><a href="newtonindex.html">← Back to Main Hub</a></div>
    </div>
</div>

</body>
</html>
