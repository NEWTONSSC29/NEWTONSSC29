<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Welcome | My Digital Space</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;

    /* Background Design */
    background: 
        linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
        url('https://i.postimg.cc/FFxRkD9x/download-(7).png');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* Soft moving glow effect */
body::before {
    content: "";
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255,255,255,0.06), transparent 70%);
    top: -200px;
    left: -200px;
    animation: moveGlow 10s infinite alternate ease-in-out;
    z-index: 0;
}

@keyframes moveGlow {
    from { transform: translate(0,0); }
    to { transform: translate(200px,150px); }
}

.welcome-header {
    margin-bottom: 40px;
    animation: fadeIn 1.2s ease-out;
    position: relative;
    z-index: 1;
}

.welcome-header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 2.8rem;
    letter-spacing: 3px;
    margin: 0;
    text-shadow: 0 0 10px rgba(255,255,255,0.2);
}

.welcome-header p {
    color: #cfcfcf;
    margin-top: 10px;
    font-size: 1rem;
}

/* Container */
.container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    max-width: 900px;
    padding: 20px;
    position: relative;
    z-index: 1;
}

/* Glass Grey Boxes */
.box {
    flex: 1 1 200px;
    background: rgba(40,40,40,0.6);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    border: 1px solid rgba(255,255,255,0.08);
    transition: 0.3s ease;
    overflow: hidden;
}

.box:hover {
    transform: translateY(-8px);
    background: rgba(60,60,60,0.7);
    box-shadow: 0 10px 30px rgba(255,255,255,0.1);
}

.box a {
    display: block;
    padding: 30px 20px;
    text-decoration: none;
    color: white;
    font-weight: 500;
    font-size: 1.1rem;
    letter-spacing: 1px;
}

/* Back Button */
.back-button {
    background: rgba(20,20,20,0.7);
}

.back-button:hover {
    background: rgba(0,0,0,0.8);
}

.back-button a {
    color: #bbbbbb;
    font-size: 0.9rem;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 600px) {
    .welcome-header h1 { font-size: 2rem; }
    .container { flex-direction: column; width: 85%; }
}
</style>
</head>

<body>

<div class="welcome-header">
    <h1>WELCOME</h1>
    <p>Explore the space I built</p>
</div>

<div class="container">
    <div class="box"><a href="profile.html">My Profile</a></div>
    <div class="box"><a href="gallery.html">Visual Gallery</a></div>
    <div class="box"><a href="hobby.html">Interests & Hobbies</a></div>
    <div class="box back-button"><a href="newtonindex.html">← Back to Main Hub</a></div>
</div>

</body>
</html>
